<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streaks — Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #F5F2EE;
      --surface:       #FDFCFA;
      --surface2:      #F0EDE8;
      --border:        rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text:          #1A1714;
      --text-muted:    #7A746E;
      --text-faint:    #B0A89E;
      --accent:        #2D6A4F;
      --accent-light:  #D8EEE3;
      --check-done:    #2D6A4F;
      --check-done-bg: #D8EEE3;
      --streak:        #E07A2F;
      --danger:        #C44B2B;
      --today-bg:      #2D6A4F;
      --today-text:    #ffffff;
      --sans:  'DM Sans',  sans-serif;
      --mono:  'DM Mono',  monospace;
      --radius:    10px;
      --radius-sm:  6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #15130F;
        --surface:       #1E1B17;
        --surface2:      #252118;
        --border:        rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);
        --text:          #F0EDE8;
        --text-muted:    #8A8077;
        --text-faint:    #504840;
        --accent:        #52B788;
        --accent-light:  #0D2E1F;
        --check-done:    #52B788;
        --check-done-bg: #0D2E1F;
        --danger:        #E07A5F;
      }
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .logo {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }

    .week-label {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Week nav ── */
    .week-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .nav-btn:hover { background: var(--surface2); border-color: var(--border-strong); }
    .nav-btn.today-btn {
      background: var(--accent-light);
      color: var(--accent);
      border-color: transparent;
    }
    .nav-btn.today-btn:hover { opacity: 0.85; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Grid card ── */
    .grid-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .grid-header,
    .habit-row {
      display: grid;
      grid-template-columns: 1fr repeat(7, 40px) 60px;
      align-items: stretch;
    }

    /* ── Grid header ── */
    .grid-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .col-head {
      padding: 10px 4px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-left: 1px solid var(--border);
      line-height: 1.3;
    }
    .col-head:first-child {
      border-left: none;
      text-align: left;
      padding-left: 16px;
    }
    .col-head.is-today {
      background: var(--today-bg);
      color: var(--today-text);
      font-weight: 700;
    }
    .col-head.streak-head { color: var(--streak); }

    /* ── Habit rows ── */
    .habit-row {
      border-top: 1px solid var(--border);
      transition: background 0.12s;
    }
    .habit-row:hover { background: var(--surface2); }

    .habit-name-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px 0 16px;
      min-width: 0;
    }

    .habit-name {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 12px 0;
      cursor: pointer;
      user-select: none;
    }

    /* rename input */
    .rename-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--accent);
      font-family: var(--sans);
      font-size: 14px;
      color: var(--text);
      outline: none;
      padding: 2px 0;
      min-width: 0;
    }

    .rename-hint {
      font-size: 11px;
      color: var(--text-faint);
      white-space: nowrap;
      font-family: var(--mono);
    }

    /* delete button */
    .del-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 14px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .habit-row:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--danger); }

    /* ── Check cells ── */
    .check-cell {
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 4px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .check-cell.is-today { background: rgba(45,106,79,0.05); }
    .check-cell:hover:not(.disabled) { background: var(--check-done-bg); }
    .check-cell.disabled {
      cursor: default;
      opacity: 0.38;
      pointer-events: none;
    }

    .checkmark {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .checkmark.checked {
      background: var(--check-done);
      border-color: var(--check-done);
    }
    .checkmark svg {
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.15s, transform 0.15s;
    }
    .checkmark.checked svg {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Streak cell ── */
    .streak-cell {
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
    }
    .streak-val {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--streak);
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .streak-val.zero { color: var(--text-faint); }

    /* ── Empty state ── */
    .empty {
      padding: 4rem 2rem;
      text-align: center;
    }
    .empty-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 1rem;
      color: var(--text-faint);
    }
    .empty h2 {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .empty p {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 260px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Add habit ── */
    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }

    .add-wrap {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .add-input {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--text-faint); }

    .add-btn {
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .add-btn:hover { opacity: 0.85; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .grid-header,
      .habit-row {
        grid-template-columns: 1fr repeat(7, 32px) 48px;
      }
      .rename-hint { display: none; }
    }
  </style>
</head>
<body>
<div class="app" id="root"></div>

<script>
  // ── Constants ──────────────────────────────────────────
  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // ── Date helpers ───────────────────────────────────────
  function getMonday(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    return d;
  }

  function addDays(date, n) {
    const d = new Date(date);
    d.setDate(d.getDate() + n);
    return d;
  }

  function dateKey(date) {
    return date.toISOString().slice(0, 10);
  }

  function isSameDay(a, b) {
    return dateKey(a) === dateKey(b);
  }

  function formatWeekLabel(monday) {
    const sunday = addDays(monday, 6);
    const opts = { month: 'short', day: 'numeric' };
    return (
      monday.toLocaleDateString('en-GB', opts) +
      ' – ' +
      sunday.toLocaleDateString('en-GB', opts)
    );
  }

  function getWeekDates() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const monday = addDays(getMonday(today), state.weekOffset * 7);
    return Array.from({ length: 7 }, (_, i) => addDays(monday, i));
  }

  // ── Persistence ────────────────────────────────────────
  function loadState() {
    try {
      const raw = localStorage.getItem('streaks_v1');
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return { habits: [], checks: {} };
  }

  function saveState() {
    try {
      localStorage.setItem('streaks_v1', JSON.stringify({
        habits: state.habits,
        checks: state.checks
      }));
    } catch (e) {}
  }

  // ── State ──────────────────────────────────────────────
  let state = {
    ...loadState(),
    weekOffset: 0,   // 0 = this week, -1 = last week, etc.
    editingId: null  // habit id currently being renamed
  };

  // ── Helpers ────────────────────────────────────────────
  function makeId() {
    return 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  }

  function isChecked(habitId, date) {
    return !!(state.checks[habitId]?.[dateKey(date)]);
  }

  function toggleCheck(habitId, date) {
    const dk = dateKey(date);
    if (!state.checks[habitId]) state.checks[habitId] = {};
    if (state.checks[habitId][dk]) {
      delete state.checks[habitId][dk];
    } else {
      state.checks[habitId][dk] = true;
    }
    saveState();
  }

  function computeStreak(habitId) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    // start from today if checked, else from yesterday
    const todayChecked = isChecked(habitId, today);
    let cursor = todayChecked ? today : addDays(today, -1);
    let streak = 0;
    while (isChecked(habitId, cursor)) {
      streak++;
      cursor = addDays(cursor, -1);
    }
    return streak;
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    const root  = document.getElementById('root');
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const weekDates    = getWeekDates();
    const monday       = weekDates[0];
    const isThisWeek   = state.weekOffset === 0;
    const isFutureWeek = monday > today;

    // ── Header ──
    let html = `
      <div class="header">
        <div>
          <div class="logo">streaks<span>.</span></div>
          <div class="week-label">week of ${formatWeekLabel(monday)}</div>
        </div>
        <div class="week-nav">
          <button class="nav-btn" id="btn-prev">← prev</button>
          ${!isThisWeek
            ? `<button class="nav-btn today-btn" id="btn-today">today</button>`
            : ''}
          <button class="nav-btn" id="btn-next"
            ${isFutureWeek ? 'disabled' : ''}>next →</button>
        </div>
      </div>
    `;

    // ── Grid ──
    html += `<div class="grid-wrap">`;

    // Column headers
    html += `<div class="grid-header">`;
    html += `<div class="col-head">habit</div>`;
    weekDates.forEach((d, i) => {
      const isToday = isSameDay(d, today);
      html += `
        <div class="col-head ${isToday ? 'is-today' : ''}">
          ${DAY_NAMES[i]}<br/>
          <span style="font-size:10px;opacity:${isToday ? '.9' : '.7'}">
            ${d.getDate()}
          </span>
        </div>
      `;
    });
    html += `<div class="col-head streak-head">🔥</div>`;
    html += `</div>`;

    // Habits or empty state
    if (state.habits.length === 0) {
      html += `
        <div class="empty">
          <span class="empty-icon">◻</span>
          <h2>No habits yet</h2>
          <p>Add your first habit below — something small you want to do every day.</p>
        </div>
      `;
    } else {
      state.habits.forEach(h => {
        const isEditing = state.editingId === h.id;
        const streak    = computeStreak(h.id);

        html += `<div class="habit-row" data-id="${h.id}">`;

        // ── Name cell ──
        html += `<div class="habit-name-cell">`;
        if (isEditing) {
          // show rename input
          html += `
            <input
              class="rename-input"
              id="rename-input"
              type="text"
              value="${h.name.replace(/"/g, '&quot;')}"
              maxlength="50"
              aria-label="Rename habit"
            />
            <span class="rename-hint">enter ✓ · esc ✗</span>
          `;
        } else {
          // show name + pencil + delete
          html += `
            <div class="habit-name"
              data-edit="${h.id}"
              title="Double-click to rename">${h.name}</div>
            <button class="del-btn" data-del="${h.id}"
              aria-label="Delete ${h.name}">✕</button>
          `;
        }
        html += `</div>`;

        // ── Check cells ──
        weekDates.forEach((d, i) => {
          const isToday  = isSameDay(d, today);
          const isFuture = d > today;
          const checked  = isChecked(h.id, d);

          let cellClass = 'check-cell';
          if (isToday)  cellClass += ' is-today';
          if (isFuture) cellClass += ' disabled';

          html += `
            <div class="${cellClass}"
              ${!isFuture ? `data-toggle="${h.id}" data-date="${dateKey(d)}"` : ''}
              ${!isFuture ? 'tabindex="0" role="checkbox"' : ''}
              aria-checked="${checked}"
              aria-label="${DAY_NAMES[i]} ${d.getDate()}">
              <div class="checkmark ${checked ? 'checked' : ''}">
                <svg width="11" height="8" viewBox="0 0 11 8" fill="none">
                  <path d="M1 3.5L4 6.5L10 1"
                    stroke="white" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
          `;
        });

        // ── Streak cell ──
        html += `
          <div class="streak-cell">
            ${streak > 0
              ? `<div class="streak-val">
                   ${streak}<span style="font-size:10px;margin-left:1px">d</span>
                 </div>`
              : `<div class="streak-val zero">—</div>`
            }
          </div>
        `;

        html += `</div>`; // end .habit-row
      });
    }

    html += `</div>`; // end .grid-wrap

    // ── Add habit form ──
    html += `
      <div class="section-label">add habit</div>
      <div class="add-wrap">
        <input
          class="add-input"
          id="habit-input"
          type="text"
          placeholder="e.g. Read 30 min, Exercise, Journal..."
          maxlength="50"
          aria-label="New habit name"
        />
        <button class="add-btn" id="add-btn">+ add</button>
      </div>
    `;

    root.innerHTML = html;

    // focus rename input if editing
    if (state.editingId) {
      const ri = document.getElementById('rename-input');
      if (ri) { ri.focus(); ri.select(); }
    }

    bindEvents();
  }

  // ── Event binding ──────────────────────────────────────
  function bindEvents() {
    // Add habit
    document.getElementById('add-btn')
      .addEventListener('click', addHabit);
    document.getElementById('habit-input')
      .addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });

    // Delete habit
    document.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Delete this habit and all its history?')) {
          delete state.checks[btn.dataset.del];
          state.habits = state.habits.filter(h => h.id !== btn.dataset.del);
          saveState();
          render();
        }
      });
    });

    // Double-click habit name → start rename
    document.querySelectorAll('[data-edit]').forEach(el => {
      el.addEventListener('dblclick', () => {
        state.editingId = el.dataset.edit;
        render();
      });
    });

    // Rename input — commit on Enter, cancel on Escape, commit on blur
    const renameInput = document.getElementById('rename-input');
    if (renameInput) {
      renameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter')  commitRename(renameInput.value);
        if (e.key === 'Escape') cancelRename();
      });
      renameInput.addEventListener('blur', () => {
        commitRename(renameInput.value);
      });
    }

    // Checkmark toggles — click
    document.querySelectorAll('[data-toggle]').forEach(cell => {
      cell.addEventListener('click', () => {
        toggleCheck(
          cell.dataset.toggle,
          new Date(cell.dataset.date + 'T00:00:00')
        );
        render();
      });
      // keyboard: Enter or Space
      cell.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggleCheck(
            cell.dataset.toggle,
            new Date(cell.dataset.date + 'T00:00:00')
          );
          render();
        }
      });
    });

    // Week navigation
    document.getElementById('btn-prev')
      .addEventListener('click', () => { state.weekOffset--; render(); });

    document.getElementById('btn-next')
      .addEventListener('click', () => {
        if (state.weekOffset < 0) { state.weekOffset++; render(); }
      });

    const todayBtn = document.getElementById('btn-today');
    if (todayBtn) {
      todayBtn.addEventListener('click', () => {
        state.weekOffset = 0;
        render();
      });
    }
  }

  // ── Actions ────────────────────────────────────────────
  function addHabit() {
    const input = document.getElementById('habit-input');
    const name  = input.value.trim();
    if (!name) return;
    state.habits.push({ id: makeId(), name });
    saveState();
    render();
    document.getElementById('habit-input').focus();
  }

  function commitRename(value) {
    const name = value.trim();
    if (name && state.editingId) {
      const habit = state.habits.find(h => h.id === state.editingId);
      if (habit) habit.name = name;
      saveState();
    }
    state.editingId = null;
    render();
  }

  function cancelRename() {
    state.editingId = null;
    render();
  }

  // ── Boot ───────────────────────────────────────────────
  render();
</script>
</body>
</html>
