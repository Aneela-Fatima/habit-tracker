<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streaks — Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #F5F2EE;
      --surface:       #FDFCFA;
      --surface2:      #F0EDE8;
      --border:        rgba(0,0,0,0.10);
      --border-strong: rgba(0,0,0,0.18);
      --text:          #1A1714;
      --text-muted:    #7A746E;
      --text-faint:    #B0A89E;
      --accent:        #2D6A4F;
      --accent-light:  #D8EEE3;
      --check-done:    #2D6A4F;
      --check-done-bg: #D8EEE3;
      --streak:        #E07A2F;
      --danger:        #C44B2B;
      --today-bg:      #2D6A4F;
      --today-text:    #ffffff;
      --sans:  'DM Sans', sans-serif;
      --mono:  'DM Mono', monospace;
      --radius:    10px;
      --radius-sm:  6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            #15130F;
        --surface:       #1E1B17;
        --surface2:      #252118;
        --border:        rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);
        --text:          #F0EDE8;
        --text-muted:    #8A8077;
        --text-faint:    #504840;
        --accent:        #52B788;
        --accent-light:  #0D2E1F;
        --check-done:    #52B788;
        --check-done-bg: #0D2E1F;
        --danger:        #E07A5F;
      }
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.5;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .logo {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }

    .week-label {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .week-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .nav-btn:hover { background: var(--surface2); border-color: var(--border-strong); }
    .nav-btn.today-btn {
      background: var(--accent-light);
      color: var(--accent);
      border-color: transparent;
    }
    .nav-btn.today-btn:hover { opacity: 0.85; }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }

    .grid-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .grid-header,
    .habit-row {
      display: grid;
      grid-template-columns: 1fr repeat(7, 40px) 60px;
      align-items: stretch;
    }

    .grid-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .col-head {
      padding: 10px 4px;
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-left: 1px solid var(--border);
      line-height: 1.3;
    }
    .col-head:first-child { border-left: none; text-align: left; padding-left: 16px; }
    .col-head.is-today { background: var(--today-bg); color: var(--today-text); font-weight: 700; }
    .col-head.streak-head { color: var(--streak); }

    .habit-row {
      border-top: 1px solid var(--border);
      transition: background 0.12s;
    }
    .habit-row:hover { background: var(--surface2); }

    .habit-name-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px 0 16px;
      min-width: 0;
    }

    .habit-name {
      flex: 1;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 12px 0;
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      font-size: 14px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .habit-row:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: var(--danger); }

    .check-cell {
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 4px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .check-cell.is-today { background: rgba(45,106,79,0.05); }
    .check-cell:hover { background: var(--check-done-bg); }
    .check-cell.disabled { cursor: default; opacity: 0.38; pointer-events: none; }

    .checkmark {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .checkmark.checked { background: var(--check-done); border-color: var(--check-done); }
    .checkmark svg { opacity: 0; transform: scale(0.5); transition: opacity 0.15s, transform 0.15s; }
    .checkmark.checked svg { opacity: 1; transform: scale(1); }

    .streak-cell {
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
    }
    .streak-val {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--streak);
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .streak-val.zero { color: var(--text-faint); }

    .empty {
      padding: 4rem 2rem;
      text-align: center;
    }
    .empty-icon { font-size: 2.5rem; display: block; margin-bottom: 1rem; color: var(--text-faint); }
    .empty h2 { font-size: 1.05rem; font-weight: 500; color: var(--text); margin-bottom: 0.4rem; }
    .empty p { font-size: 13px; color: var(--text-muted); max-width: 260px; margin: 0 auto; line-height: 1.6; }

    .section-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }

    .add-wrap {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .add-input {
      flex: 1;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: var(--text-faint); }

    .add-btn {
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 20px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .add-btn:hover { opacity: 0.85; }

    @media (max-width: 600px) {
      .grid-header, .habit-row {
        grid-template-columns: 1fr repeat(7, 32px) 48px;
      }
    }
  </style>
</head>
<body>
<div class="app" id="root"></div>

<script>
  // ── Date helpers ───────────────────────────────────────
  const DAY_NAMES = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Get the Monday of any given date's week
  function getMonday(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    const day = d.getDay();                  // 0=Sun, 1=Mon … 6=Sat
    const diff = day === 0 ? -6 : 1 - day;  // how many days back to Monday
    d.setDate(d.getDate() + diff);
    return d;
  }

  // Add N days to a date, return new Date
  function addDays(date, n) {
    const d = new Date(date);
    d.setDate(d.getDate() + n);
    return d;
  }

  // "2025-05-23" — used as a unique key for each day
  function dateKey(date) {
    return date.toISOString().slice(0, 10);
  }

  // Are two dates the same calendar day?
  function isSameDay(a, b) {
    return dateKey(a) === dateKey(b);
  }

  // "19 May – 25 May"
  function formatWeekLabel(monday) {
    const sunday = addDays(monday, 6);
    const opts = { month: 'short', day: 'numeric' };
    return (
      monday.toLocaleDateString('en-GB', opts) +
      ' – ' +
      sunday.toLocaleDateString('en-GB', opts)
    );
  }

  // Returns array of 7 Date objects [Mon … Sun] for the current weekOffset
  function getWeekDates() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const monday = addDays(getMonday(today), state.weekOffset * 7);
    return Array.from({ length: 7 }, (_, i) => addDays(monday, i));
  }

  // ── State ──────────────────────────────────────────────
  let state = {
    habits: [],
    weekOffset: 0    // 0 = current week, -1 = last week, +1 = next week
  };

  // ── Helpers ────────────────────────────────────────────
  function makeId() {
    return 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  }

  // ── Render ─────────────────────────────────────────────
  function render() {
    const root    = document.getElementById('root');
    const today   = new Date();
    today.setHours(0, 0, 0, 0);

    const weekDates   = getWeekDates();
    const monday      = weekDates[0];
    const isThisWeek  = state.weekOffset === 0;
    const isFutureWeek = monday > today;

    // ── Header ──
    let html = `
      <div class="header">
        <div>
          <div class="logo">streaks<span>.</span></div>
          <div class="week-label">week of ${formatWeekLabel(monday)}</div>
        </div>
        <div class="week-nav">
          <button class="nav-btn" id="btn-prev">← prev</button>
          ${!isThisWeek
            ? `<button class="nav-btn today-btn" id="btn-today">today</button>`
            : ''}
          <button class="nav-btn" id="btn-next"
            ${isFutureWeek ? 'disabled' : ''}>next →</button>
        </div>
      </div>
    `;

    // ── Grid ──
    html += `<div class="grid-wrap">`;

    // Column headers — built from real dates
    html += `<div class="grid-header">`;
    html += `<div class="col-head">habit</div>`;

    weekDates.forEach((d, i) => {
      const isToday = isSameDay(d, today);
      html += `
        <div class="col-head ${isToday ? 'is-today' : ''}">
          ${DAY_NAMES[i]}<br/>
          <span style="font-size:10px;opacity:${isToday ? '.9' : '.7'}">
            ${d.getDate()}
          </span>
        </div>
      `;
    });

    html += `<div class="col-head streak-head">🔥</div>`;
    html += `</div>`; // end .grid-header

    // ── Habits or empty state ──
    if (state.habits.length === 0) {
      html += `
        <div class="empty">
          <span class="empty-icon">◻</span>
          <h2>No habits yet</h2>
          <p>Add your first habit below — something small you want to do every day.</p>
        </div>
      `;
    } else {
      state.habits.forEach(h => {
        html += `<div class="habit-row" data-id="${h.id}">`;

        // Name cell
        html += `
          <div class="habit-name-cell">
            <div class="habit-name" title="${h.name}">${h.name}</div>
            <button class="del-btn" data-del="${h.id}"
              aria-label="Delete ${h.name}">✕</button>
          </div>
        `;

        // 7 check cells — one per day
        weekDates.forEach((d, i) => {
          const isToday  = isSameDay(d, today);
          const isFuture = d > today;

          let cellClass = 'check-cell';
          if (isToday)  cellClass += ' is-today';
          if (isFuture) cellClass += ' disabled';

          html += `
            <div class="${cellClass}">
              <div class="checkmark"></div>
            </div>
          `;
        });

        // Streak cell (always — for now)
        html += `
          <div class="streak-cell">
            <div class="streak-val zero">—</div>
          </div>
        `;

        html += `</div>`; // end .habit-row
      });
    }

    html += `</div>`; // end .grid-wrap

    // ── Add habit form ──
    html += `
      <div class="section-label">add habit</div>
      <div class="add-wrap">
        <input
          class="add-input"
          id="habit-input"
          type="text"
          placeholder="e.g. Read 30 min, Exercise, Journal..."
          maxlength="50"
          aria-label="New habit name"
        />
        <button class="add-btn" id="add-btn">+ add</button>
      </div>
    `;

    root.innerHTML = html;
    bindEvents();
  }

  // ── Event binding ──────────────────────────────────────
  function bindEvents() {
    // Add habit
    document.getElementById('add-btn')
      .addEventListener('click', addHabit);
    document.getElementById('habit-input')
      .addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });

    // Delete habit
    document.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Delete this habit and all its history?')) {
          state.habits = state.habits.filter(h => h.id !== btn.dataset.del);
          render();
        }
      });
    });

    // Week navigation
    document.getElementById('btn-prev')
      .addEventListener('click', () => { state.weekOffset--; render(); });

    document.getElementById('btn-next')
      .addEventListener('click', () => {
        if (state.weekOffset < 0) { state.weekOffset++; render(); }
      });

    const todayBtn = document.getElementById('btn-today');
    if (todayBtn) {
      todayBtn.addEventListener('click', () => { state.weekOffset = 0; render(); });
    }
  }

  // ── Actions ────────────────────────────────────────────
  function addHabit() {
    const input = document.getElementById('habit-input');
    const name  = input.value.trim();
    if (!name) return;
    state.habits.push({ id: makeId(), name });
    render();
    document.getElementById('habit-input').focus();
  }

  // ── Boot ───────────────────────────────────────────────
  render();
</script>
</body>
</html>
